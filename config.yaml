keywords:
  levels:
    - graduate
    - junior
    - entry
    - associate
    - "early career"
    - cadet

  roles:
    software:
      - "software engineer"
      - "software developer"
      - "backend developer"
      - "frontend developer"
      - "full stack"
      - "fullstack"
      - "web developer"
      - "devops engineer"
      - "platform engineer"
    consulting:
      - "technology consultant"
      - "it consultant"
      - "solutions consultant"
      - "technology consulting"
      - "digital consultant"
    cloud_devops:
      - "cloud engineer"
      - "cloud architect"
      - "cloud operations"
      - "site reliability engineer"
      - "infrastructure engineer"
    architecture:
      - "junior architect"
      - "associate architect"
      - "solutions architect"
      - "technical architect"
    programs:
      - "graduate program"
      - "graduate programme"
      - "tech graduate"
      - "technology consultant graduate"
      - "consulting graduate program"
      - "rotation program"
      - "rotational program"
      - "internship"
      - "cadet program"

locations:
  primary:
    - Adelaide
    - Melbourne
  optional:
    - Remote
    - Hybrid

filters:
  include_remote: false

email:
  subject_template: "Daily Junior/Grad Jobs – Adelaide & Melbourne – {date}"
  smtp_server: "smtp.gmail.com"
  smtp_port: 587

recruiter_lookup:
  enabled: true
  provider: brave              # brave | google_cse | none
  max_contacts_per_company: 3  # contacts returned per company (1 API query/company)
  cache_ttl_days: 7            # evict cache entries older than this

sources:
  prosple:
    enabled: true
    rate_limit_seconds: 2
  gradconnection:
    enabled: true
    rate_limit_seconds: 2
  seek:
    enabled: true
    rate_limit_seconds: 2
  linkedin:
    enabled: true
    rate_limit_seconds: 3
  adzuna:
    enabled: true        # covers Indeed + Jora + 50 other boards — needs ADZUNA_APP_ID / ADZUNA_APP_KEY
    rate_limit_seconds: 2
  indeed:
    enabled: false       # blocked — use Adzuna instead
  company_careers:
    enabled: true
    rate_limit_seconds: 2
  govt_careers:
    enabled: true
    rate_limit_seconds: 2
  greenhouse:
    enabled: true        # Greenhouse ATS — covers Canva, Xero, Atlassian, REA Group, etc.
    rate_limit_seconds: 1.5
  lever:
    enabled: true        # Lever ATS — Deputy verified live (10 jobs); other slugs may be stale
    rate_limit_seconds: 1.5
  ashby:
    enabled: true        # Ashby ATS — AU companies: Airwallex, Xero, Zip, Rokt, Dovetail, etc.
    rate_limit_seconds: 1.5
  smartrecruiters:
    enabled: true        # SmartRecruiters ATS — Canva (302 jobs), SEEK (80), Nearmap, Carsales, etc.
    rate_limit_seconds: 1.5
  workday:
    enabled: true        # Workday ATS — NAB, Telstra, REA Group (ANZ/CBA/BHP paths pending verification)
    rate_limit_seconds: 2.0
  atlassian:
    enabled: true        # Atlassian custom JSON proxy (~80 postings, all roles, AU+junior filtered)
    rate_limit_seconds: 2.0
  builtin:
    enabled: true        # Built In Melbourne — curated tech-company board (Xero, Square, etc.)
    rate_limit_seconds: 2.0
  jora:
    enabled: false       # disabled: Jora now requires JavaScript for search
  email_alerts:
    enabled: false
